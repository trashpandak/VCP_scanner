# ─────────────────────────────────────────────────────────────────────────────
# VCP Scanner — Linux / macOS Cron + Local Runner Config
#
# For running on your own machine or a VPS (AWS EC2, DigitalOcean, etc.)
# instead of GitHub Actions.
#
# Sections:
#   A. Crontab entries  (paste into: crontab -e)
#   B. Systemd service  (for Ubuntu/Debian VPS)
#   C. Environment file (stores credentials outside the code)
#   D. Log rotation     (logrotate config)
#   E. Health check     (simple uptime ping after each run)
# ─────────────────────────────────────────────────────────────────────────────

# ════════════════════════════════════════════════════════════════════════════
# A. CRONTAB  —  paste these lines into: crontab -e
# ════════════════════════════════════════════════════════════════════════════
#
# Prerequisites:
#   1. cd /path/to/vcp_scanner && python main.py --download   (one-time full download)
#   2. Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in ~/.vcp_env (Section C)
#
# Replace /path/to/vcp_scanner with the actual path on your machine.
# Replace /path/to/python with the output of: which python
# (if using a venv: /path/to/vcp_scanner/venv/bin/python)

cron:
  entries:

    # ── Daily scan (Mon–Fri, 09:45 IST = 04:15 UTC) ─────────────────────────
    daily_scan:
      schedule: "15 4 * * 1-5"
      timezone: "UTC"           # IST is UTC+5:30; 09:45 IST = 04:15 UTC
      command: >
        cd /path/to/vcp_scanner &&
        source ~/.vcp_env &&
        /path/to/python main.py --download --save
        >> /path/to/vcp_scanner/logs/cron_daily.log 2>&1
      comment: "Daily VCP scan — runs after market open to capture latest prices"

    # ── End-of-day scan (Mon–Fri, 16:30 IST = 11:00 UTC) ───────────────────
    # Optionally run a second scan after market close to capture
    # breakouts that happened intraday and confirmed at close.
    eod_scan:
      schedule: "00 11 * * 1-5"
      timezone: "UTC"           # 16:30 IST = 11:00 UTC
      command: >
        cd /path/to/vcp_scanner &&
        source ~/.vcp_env &&
        /path/to/python main.py --download --save
        >> /path/to/vcp_scanner/logs/cron_eod.log 2>&1
      comment: "End-of-day VCP scan — confirmed breakouts at market close"

    # ── Weekend data refresh (Saturday, 08:00 IST = 02:30 UTC) ─────────────
    # Download corporate actions, splits, dividends that yfinance adjusts
    # retroactively on weekends. Full refresh ensures adjusted prices are
    # up to date before Monday's scan.
    weekend_refresh:
      schedule: "30 2 * * 6"
      timezone: "UTC"           # Saturday 08:00 IST = 02:30 UTC
      command: >
        cd /path/to/vcp_scanner &&
        source ~/.vcp_env &&
        /path/to/python main.py --download --full-refresh
        >> /path/to/vcp_scanner/logs/cron_refresh.log 2>&1
      comment: "Full data refresh — adjusts for splits/dividends announced during the week"

    # ── Monthly backtest (first Sunday of every month, 06:00 IST) ───────────
    # Re-run the full backtest monthly to check if parameter tuning is needed.
    # Results are saved to the database; generate the Excel report manually
    # with: python main.py --report <run_id>
    monthly_backtest:
      schedule: "30 0 1-7 * 0"
      timezone: "UTC"           # 06:00 IST = 00:30 UTC; day 1-7 + Sun = first Sunday
      command: >
        cd /path/to/vcp_scanner &&
        source ~/.vcp_env &&
        /path/to/python main.py --backtest-all
        >> /path/to/vcp_scanner/logs/cron_backtest.log 2>&1
      comment: "Monthly backtest — runs on first Sunday of each month"

# ── What the actual crontab should look like ─────────────────────────────────
# (Copy these 4 lines and paste them into `crontab -e`)
#
# 15 4  * * 1-5  cd /path/to/vcp_scanner && source ~/.vcp_env && /path/to/python main.py --download --save >> logs/cron_daily.log 2>&1
# 00 11 * * 1-5  cd /path/to/vcp_scanner && source ~/.vcp_env && /path/to/python main.py --download --save >> logs/cron_eod.log 2>&1
# 30 2  * * 6    cd /path/to/vcp_scanner && source ~/.vcp_env && /path/to/python main.py --download --full-refresh >> logs/cron_refresh.log 2>&1
# 30 0  1-7 * 0  cd /path/to/vcp_scanner && source ~/.vcp_env && /path/to/python main.py --backtest-all >> logs/cron_backtest.log 2>&1


# ════════════════════════════════════════════════════════════════════════════
# B. SYSTEMD SERVICE  —  for Ubuntu/Debian VPS (auto-restart on reboot)
# ════════════════════════════════════════════════════════════════════════════
#
# Save as: /etc/systemd/system/vcp-scanner.service
# Then run:
#   sudo systemctl daemon-reload
#   sudo systemctl enable vcp-scanner
#   sudo systemctl start vcp-scanner
#
# NOTE: The systemd timer (vcp-scanner.timer) below handles scheduling —
# the service itself just runs once when activated by the timer.

systemd:
  service:
    file_path: /etc/systemd/system/vcp-scanner.service
    content: |
      [Unit]
      Description=VCP Scanner — NSE India
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu                          # change to your linux user
      WorkingDirectory=/path/to/vcp_scanner
      EnvironmentFile=/home/ubuntu/.vcp_env
      ExecStart=/path/to/python main.py --download --save
      StandardOutput=append:/path/to/vcp_scanner/logs/systemd_daily.log
      StandardError=append:/path/to/vcp_scanner/logs/systemd_daily.log
      TimeoutStartSec=1800                 # 30 min max run time
      Restart=no

      [Install]
      WantedBy=multi-user.target

  timer:
    file_path: /etc/systemd/system/vcp-scanner.timer
    content: |
      [Unit]
      Description=VCP Scanner Timer — runs weekdays at 09:45 IST and 16:30 IST

      [Timer]
      # 09:45 IST = 04:15 UTC
      OnCalendar=Mon-Fri 04:15:00 UTC
      # 16:30 IST = 11:00 UTC (end-of-day confirmation scan)
      OnCalendar=Mon-Fri 11:00:00 UTC
      Persistent=true                      # run if the machine was off at scheduled time
      RandomizedDelaySec=120               # ±2 min jitter to avoid yfinance rate limits

      [Install]
      WantedBy=timers.target

  backtest_service:
    file_path: /etc/systemd/system/vcp-backtest.service
    content: |
      [Unit]
      Description=VCP Scanner — Monthly Backtest
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/path/to/vcp_scanner
      EnvironmentFile=/home/ubuntu/.vcp_env
      ExecStart=/path/to/python main.py --backtest-all
      StandardOutput=append:/path/to/vcp_scanner/logs/systemd_backtest.log
      StandardError=append:/path/to/vcp_scanner/logs/systemd_backtest.log
      TimeoutStartSec=7200                 # 2 hr max (full NSE backtest)
      Restart=no

  backtest_timer:
    file_path: /etc/systemd/system/vcp-backtest.timer
    content: |
      [Unit]
      Description=VCP Backtest Timer — first Sunday of every month at 06:00 IST

      [Timer]
      # First Sunday of each month at 00:30 UTC (06:00 IST)
      OnCalendar=Sun *-*-01..07 00:30:00 UTC
      Persistent=true

      [Install]
      WantedBy=timers.target


# ════════════════════════════════════════════════════════════════════════════
# C. ENVIRONMENT FILE  —  /home/ubuntu/.vcp_env
# ════════════════════════════════════════════════════════════════════════════
#
# Store credentials OUTSIDE the code repo. Never commit this file to Git.
# Add to .gitignore: .vcp_env, *.env
#
# Create it with: nano ~/.vcp_env
# Then: chmod 600 ~/.vcp_env   (readable only by your user)

environment:
  file_path: "~/.vcp_env"
  permissions: "600"
  content: |
    # VCP Scanner environment variables
    # chmod 600 ~/.vcp_env  — never commit this file to Git

    TELEGRAM_BOT_TOKEN=your_bot_token_here
    TELEGRAM_CHAT_ID=your_chat_id_here

    # Optional overrides (defaults are in config.py)
    ACCOUNT_SIZE=1000000
    RISK_PCT=1.0

  gitignore_entry: |
    # VCP Scanner — never commit credentials or local data
    .vcp_env
    *.env
    data/daily/
    data/signals/
    logs/
    reports/
    __pycache__/
    *.pyc


# ════════════════════════════════════════════════════════════════════════════
# D. LOG ROTATION  —  /etc/logrotate.d/vcp-scanner
# ════════════════════════════════════════════════════════════════════════════
#
# Prevents log files from growing unbounded.
# Install: sudo cp logrotate_vcp.conf /etc/logrotate.d/vcp-scanner
# Test: sudo logrotate -d /etc/logrotate.d/vcp-scanner

logrotate:
  file_path: /etc/logrotate.d/vcp-scanner
  content: |
    /path/to/vcp_scanner/logs/*.log {
        daily
        rotate 30               # keep 30 days of logs
        compress                # gzip old logs
        delaycompress           # compress yesterday's log, not today's
        missingok               # don't error if log file is missing
        notifempty              # don't rotate if log file is empty
        copytruncate            # truncate in place (no service restart needed)
        dateext                 # add date to rotated filename
        dateformat -%Y-%m-%d
    }


# ════════════════════════════════════════════════════════════════════════════
# E. HEALTH CHECK  —  optional uptime monitoring
# ════════════════════════════════════════════════════════════════════════════
#
# If any run (scan or backtest) completes without error, ping an uptime
# monitor (healthchecks.io is free, or use UptimeRobot webhook).
# Add this to your crontab line AFTER the python command, separated by &&:
#
#   ... && python main.py --download --save && curl -fsS --retry 3 $HEALTHCHECK_URL

healthcheck:
  provider: healthchecks.io          # free tier: up to 20 checks
  setup: |
    1. Sign up at https://healthchecks.io
    2. Create a new check: Schedule = "Every day on weekdays"
    3. Copy the ping URL (e.g. https://hc-ping.com/abc-123)
    4. Add to ~/.vcp_env:  HEALTHCHECK_URL=https://hc-ping.com/abc-123
    5. Add to crontab line: ... && curl -fsS --retry 3 $HEALTHCHECK_URL > /dev/null
  alert_if_not_pinged_after: 25h    # alerts if the scan didn't run in 25 hours
