# ─────────────────────────────────────────────────────────────────────────────
# VCP Scanner — Full Universe Backtest
# GitHub Actions Workflow
#
# ONLY runs on manual trigger (workflow_dispatch) — never on a schedule.
# A full NSE universe backtest takes 45-90 min; you run it intentionally
# after tuning config parameters, not automatically every day.
#
# What it does:
#   1. Fresh price data download (full history, ~5-8 years)
#   2. Walk-forward backtest across all NSE symbols
#   3. Generates 7-sheet Excel analysis report
#   4. Uploads Excel report + trade log + database as artifacts (90-day)
#   5. Sends Telegram notification with headline metrics
#
# Secrets required:
#   TELEGRAM_BOT_TOKEN   — optional; skip notification if not set
#   TELEGRAM_CHAT_ID     — optional
#   ACCOUNT_SIZE         — optional, defaults to 1000000
#   RISK_PCT             — optional, defaults to 1.0
# ─────────────────────────────────────────────────────────────────────────────

name: VCP Backtest

on:
  workflow_dispatch:
    inputs:
      symbol_limit:
        description: "Max symbols to test (leave empty = ALL, use 100 for a quick test)"
        required: false
        default: ""
      notes:
        description: "Notes to attach to this backtest run (e.g. 'Tightened ATR threshold to 0.55')"
        required: false
        default: ""
      notify_telegram:
        description: "Send Telegram notification with results? (yes / no)"
        required: false
        default: "yes"

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
  ACCOUNT_SIZE:       ${{ secrets.ACCOUNT_SIZE || '1000000' }}
  RISK_PCT:           ${{ secrets.RISK_PCT || '1.0' }}

jobs:
  vcp-backtest:
    name: VCP Backtest — Full NSE Universe
    runs-on: ubuntu-latest
    timeout-minutes: 150      # full NSE backtest takes 45-90 min; 150 is safe

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Get date metadata ─────────────────────────────────────────────────
      - name: Get date metadata
        id: date
        run: |
          echo "today=$(date +'%Y-%m-%d')"       >> $GITHUB_OUTPUT
          echo "ts=$(date +'%Y%m%d_%H%M')"        >> $GITHUB_OUTPUT
          echo "ist=$(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M IST')" >> $GITHUB_OUTPUT

      # ── 4. Download full price history ───────────────────────────────────────
      # Always do a full refresh for backtests — we want the complete history,
      # not just incremental bars from the last run.
      - name: Download full NSE price history
        run: |
          echo "Starting full price history download …"
          python main.py --download --full-refresh
          echo "Download complete."
          echo "Symbols cached: $(ls data/daily/*.parquet 2>/dev/null | wc -l)"

      # ── 5. Run VCP backtest ───────────────────────────────────────────────────
      - name: Run VCP backtest
        id: backtest
        run: |
          LIMIT="${{ github.event.inputs.symbol_limit }}"
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "" ]; then
            echo "Running backtest with symbol limit: $LIMIT"
            python main.py --backtest-all --limit "$LIMIT"
          else
            echo "Running backtest across FULL NSE universe"
            python main.py --backtest-all
          fi

      # ── 6. Export trade log to CSV ───────────────────────────────────────────
      # Export from SQLite to CSV so the artifact is readable without a DB viewer
      - name: Export trade log to CSV
        if: always()
        run: |
          python - << 'PYEOF'
          import sqlite3, csv, sys
          from pathlib import Path
          db_path = Path("data/signals/vcp_signals.db")
          if not db_path.exists():
              print("No database found — skipping export")
              sys.exit(0)
          con = sqlite3.connect(db_path)
          cur = con.execute(
              "SELECT * FROM backtest_trade_log ORDER BY entry_date DESC LIMIT 50000"
          )
          cols = [d[0] for d in cur.description]
          rows = cur.fetchall()
          con.close()
          out = Path("reports/vcp_trade_log_latest.csv")
          out.parent.mkdir(exist_ok=True)
          with open(out, "w", newline="") as f:
              w = csv.writer(f)
              w.writerow(cols)
              w.writerows(rows)
          print(f"Exported {len(rows):,} trades to {out}")
          PYEOF

      # ── 7. Send Telegram notification ────────────────────────────────────────
      - name: Send Telegram backtest summary
        if: >
          github.event.inputs.notify_telegram != 'no' &&
          env.TELEGRAM_BOT_TOKEN != '' &&
          env.TELEGRAM_CHAT_ID != ''
        run: |
          python - << 'PYEOF'
          import os, sqlite3, json, urllib.request
          from pathlib import Path
          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          db_path = Path("data/signals/vcp_signals.db")
          if not db_path.exists():
              print("No DB — skipping Telegram notification")
              exit(0)
          con = sqlite3.connect(db_path)
          row = con.execute(
              "SELECT * FROM backtest_runs ORDER BY created_at DESC LIMIT 1"
          ).fetchone()
          if not row:
              print("No backtest run in DB — skipping")
              exit(0)
          cols = [d[0] for d in con.execute("SELECT * FROM backtest_runs LIMIT 0").description]
          r    = dict(zip(cols, row))
          con.close()
          msg = (
              f"📊 *VCP Backtest Complete*\n"
              f"Run: `{r.get('run_id','?')}`\n"
              f"Date: {r.get('run_date','?')}\n\n"
              f"Symbols tested:    {r.get('symbols_tested','?')}\n"
              f"With trades:       {r.get('symbols_with_trades','?')}\n"
              f"Total trades:      {r.get('total_trades','?')}\n\n"
              f"Win rate:          {r.get('win_rate','?')}%\n"
              f"Profit factor:     {r.get('profit_factor','?')}\n"
              f"Expectancy:        {r.get('expectancy','?')}R\n"
              f"Avg CAGR:          {r.get('avg_cagr','?')}%\n"
              f"Avg drawdown:      {r.get('avg_drawdown','?')}%\n\n"
              f"Notes: {r.get('notes','-')}"
          )
          data = json.dumps({
              "chat_id": chat_id,
              "text": msg,
              "parse_mode": "Markdown"
          }).encode()
          req  = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req) as resp:
              print("Telegram OK:", resp.status)
          PYEOF
        continue-on-error: true   # never fail the whole job over a notification

      # ── 8. Upload artifacts ───────────────────────────────────────────────────
      - name: Upload Excel backtest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcp-backtest-report-${{ steps.date.outputs.ts }}
          path: reports/*.xlsx
          retention-days: 90
          if-no-files-found: warn

      - name: Upload trade log CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcp-trade-log-${{ steps.date.outputs.ts }}
          path: reports/vcp_trade_log_latest.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Upload SQLite database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcp-database-${{ steps.date.outputs.ts }}
          path: data/signals/vcp_signals.db
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcp-backtest-logs-${{ steps.date.outputs.ts }}
          path: logs/
          retention-days: 30

      # ── 9. Job summary ────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          python - << 'PYEOF'
          import sqlite3, os
          from pathlib import Path
          db_path = Path("data/signals/vcp_signals.db")
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          lines = [
              "## VCP Backtest Results",
              "",
          ]
          if db_path.exists():
              con = sqlite3.connect(db_path)
              row = con.execute(
                  "SELECT * FROM backtest_runs ORDER BY created_at DESC LIMIT 1"
              ).fetchone()
              if row:
                  cols = [d[0] for d in con.execute("SELECT * FROM backtest_runs LIMIT 0").description]
                  r    = dict(zip(cols, row))
                  lines += [
                      f"| Metric | Value |",
                      f"|--------|-------|",
                      f"| Run ID | `{r.get('run_id','?')}` |",
                      f"| Symbols tested | {r.get('symbols_tested','?')} |",
                      f"| Symbols with trades | {r.get('symbols_with_trades','?')} |",
                      f"| Total trades | {r.get('total_trades','?')} |",
                      f"| Win rate | **{r.get('win_rate','?')}%** |",
                      f"| Profit factor | **{r.get('profit_factor','?')}** |",
                      f"| Expectancy | **{r.get('expectancy','?')}R** |",
                      f"| Avg CAGR | {r.get('avg_cagr','?')}% |",
                      f"| Avg drawdown | {r.get('avg_drawdown','?')}% |",
                      f"| Avg hold days | {r.get('avg_hold_days','?')} |",
                      f"| Notes | {r.get('notes','-')} |",
                  ]
              con.close()
          else:
              lines.append("⚠️ No database found — backtest may have failed.")
          lines += [
              "",
              "Download the **vcp-backtest-report** artifact above to open the full Excel analysis.",
              "",
              "### Key sheets to check",
              "1. **Verdict** — overall pass/fail against 6 objective criteria",
              "2. **T-Count Analysis** — does 3T outperform 2T?",
              "3. **Contraction Analysis** — tighter final contraction = better outcomes?",
              "4. **Score Band Analysis** — does the quality score predict trade quality?",
              "5. **Yearly Performance** — regime dependency check (any year negative?)",
          ]
          with open(summary_file, "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF
