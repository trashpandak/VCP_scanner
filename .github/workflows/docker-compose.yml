# ─────────────────────────────────────────────────────────────────────────────
# VCP Scanner — Docker Compose
#
# Provides two services:
#   vcp-scanner   — runs the daily scan on a schedule inside a container
#   vcp-backtest  — runs full universe backtest (manual trigger only)
#
# Usage:
#   docker compose up vcp-scanner -d    → start daily scan daemon
#   docker compose run vcp-backtest     → run backtest once and exit
#   docker compose logs -f vcp-scanner  → tail live logs
#   docker compose down                 → stop everything
#
# First-time setup:
#   1. Copy .env.example to .env and fill in your credentials
#   2. docker compose run vcp-scanner python main.py --download --full-refresh
#   3. docker compose up vcp-scanner -d
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

# ── Shared build definition ───────────────────────────────────────────────────
x-vcp-base: &vcp-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  volumes:
    # Persist downloaded data and database between container restarts
    - vcp_daily_data:/app/data/daily
    - vcp_signals_db:/app/data/signals
    - vcp_reports:/app/reports
    - vcp_logs:/app/logs
  restart: unless-stopped

services:

  # ── Daily scan daemon ─────────────────────────────────────────────────────
  vcp-scanner:
    <<: *vcp-base
    container_name: vcp-daily-scanner
    # Uses supercronic (cron inside Docker — more reliable than system cron in containers)
    command: supercronic /app/crontab_docker
    environment:
      TZ: Asia/Kolkata          # set container timezone to IST
    # Mount the docker-specific crontab (generated by entrypoint)
    volumes:
      - vcp_daily_data:/app/data/daily
      - vcp_signals_db:/app/data/signals
      - vcp_reports:/app/reports
      - vcp_logs:/app/logs
      - ./crontab_docker:/app/crontab_docker:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/app/logs/scanner.log"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Manual backtest runner ────────────────────────────────────────────────
  # Run with: docker compose run --rm vcp-backtest
  vcp-backtest:
    <<: *vcp-base
    container_name: vcp-backtest-runner
    command: python main.py --backtest-all
    restart: "no"              # never auto-restart — run only when invoked
    profiles:
      - backtest               # only starts when: docker compose --profile backtest up

  # ── One-shot data downloader ──────────────────────────────────────────────
  # Run with: docker compose run --rm vcp-download
  vcp-download:
    <<: *vcp-base
    container_name: vcp-downloader
    command: python main.py --download --full-refresh
    restart: "no"
    profiles:
      - download

volumes:
  vcp_daily_data:
    name: vcp_daily_data
  vcp_signals_db:
    name: vcp_signals_db
  vcp_reports:
    name: vcp_reports
  vcp_logs:
    name: vcp_logs
